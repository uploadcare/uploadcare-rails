name: Publish Gem

on:
  push:
    tags:
      - v*
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to publish (for example: v5.0.0.rc1)"
        required: true
        type: string
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v5
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && format('refs/tags/{0}', inputs.tag) || github.ref }}

      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.4"
          bundler-cache: true

      - name: Resolve release tag and gem version
        run: |
          release_tag="${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}"
          gem_version="$(ruby -r rubygems -e "puts Gem::Specification.load('uploadcare-rails.gemspec').version")"
          if [ "v${gem_version}" != "${release_tag}" ]; then
            echo "Release tag (${release_tag}) does not match gem version (v${gem_version})"
            exit 1
          fi
          echo "RELEASE_TAG=${release_tag}" >> "$GITHUB_ENV"
          echo "GEM_VERSION=${gem_version}" >> "$GITHUB_ENV"

      - name: Configure RubyGems credentials
        env:
          RUBYGEMS_API_KEY: ${{ secrets.RUBYGEMS_API_KEY }}
        run: |
          mkdir -p ~/.gem
          cat << EOF > ~/.gem/credentials
          ---
          :rubygems_api_key: ${RUBYGEMS_API_KEY}
          EOF
          chmod 0600 ~/.gem/credentials

      - name: Build gem
        run: bundle exec rake build

      - name: Push gem to RubyGems
        run: gem push "pkg/uploadcare-rails-${GEM_VERSION}.gem"
